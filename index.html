<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的全能秘密大厅</title>
    <style>
        /* 让外壳撑满全屏，完美隐藏 Vercel 后台 */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <!-- 这里把 src 里面的网址，换成你刚才在 Vercel 部署成功、带绿色按钮的那个 xxx.vercel.app 网址 -->
    <iframe src="https://vercel.app"></iframe>
</body>
</html>
