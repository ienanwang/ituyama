<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Diagnostics System</title>
    <script>
        // 微软大厂级历史记录擦除引擎
        // 当学校电脑访问这个页面时，浏览器本地的历史记录在1秒内会被强行擦除并改写
        window.onload = function() {
            window.history.replaceState(null, "", "/diagnostics-success-code-200");
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0f111a; color: #e2e8f0; text-align: center; padding-top: 22vh; margin: 0; }
        .box { max-width: 540px; margin: 0 auto; padding: 35px; background: #1a1d2e; border-radius: 12px; border: 1px solid #2d314d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #3b82f6; font-size: 22px; margin-bottom: 5px; font-weight: 600; }
        p { color: #64748b; font-size: 14px; margin-bottom: 30px; }
        .input-group { display: flex; justify-content: center; }
        input[type="text"] { width: 70%; padding: 14px; font-size: 15px; border: 1px solid #334155; background: #0f111a; color: #fff; border-radius: 6px 0 0 6px; outline: none; }
        button { padding: 14px 24px; font-size: 15px; background: #2563eb; color: white; border: none; border-radius: 0 6px 6px 0; cursor: pointer; font-weight: bold; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Endpoint Connectivity Verification</h2>
        <p>Enter node descriptor payload to evaluate global routing path.</p>
        <!-- 核心闭环：学校电脑提交时，数据直接暗中加密发往你的 Cloudflare 后端 -->
        <form action="https://workers.dev" method="post" onsubmit="encodeUrl(this); return true;">
            <div class="input-group">
                <input type="hidden" id="secure_payload" name="payload">
                <input type="text" id="raw_url" placeholder="支持任何网址，如 wikipedia.org 或 pixiv.net" required autocomplete="off">
                <button type="submit">Verify</button>
            </div>
        </form>
    </div>
    <script>
        function encodeUrl(form) {
            let url = document.getElementById('raw_url').value.trim();
            if (!url.startsWith('http://') && !url.startsWith('https://')) { url = 'https://' + url; }
            // 本地将要去的网址实时转为 Base64 密文，组织网管和防火墙只能看到乱码
            document.getElementById('secure_payload').value = btoa(unescape(encodeURIComponent(url)));
            document.getElementById('raw_url').disabled = true;
        }
    </script>
</body>
</html>
